name: Hemp-OS CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint

  kernel-tests:
    name: Kernel Determinism Gate
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      # This is the "kernel is law" gate referenced in the README.
      # If this script does not exist or exits non-zero, the PR is blocked.
      - run: npm run test:kernel

  unit-tests:
    name: Vitest Suite
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx vitest run --coverage
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [kernel-tests, unit-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build

  # Required status check: branch protection on `main` should require this
  # single job so adding future parallel jobs doesn't require reconfiguring
  # branch protection every time.
  ci-gate:
    name: CI Gate (required)
    runs-on: ubuntu-latest
    needs: [lint, kernel-tests, unit-tests, build]
    steps:
      - run: echo "All checks passed."
